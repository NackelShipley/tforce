<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Customer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #eef4ff, #e6f4ec);
    display: flex;
    height: 100vh;
}

/* ========== SIDEBAR ========== */
.sidebar {
    width: 240px;
    background: #1f2937;
    color: white;
    padding: 25px 20px;
    min-height: 100vh;
}

.sidebar h2 { margin-top: 0; font-size: 20px; }

.sidebar a {
    display: block;
    color: #d1d5db;
    text-decoration: none;
    padding: 8px 0;
    font-size: 14px;
}

.sidebar a:hover { color: white; }

/* ========== MAIN CONTENT ========== */
.main-content {
    flex: 1;
    padding: 30px;
    display: flex;
    flex-direction: column;
    margin: 10px;
    min-width: 0;
}

.header {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 20px;
    margin-left: -20px;
    color: #1f2937;
}

/* ========== BOOK LAYOUT ========== */
.book-wrapper {
    position: relative;
    flex: 1;
    display: flex;
    min-width: 0;
}

.book {
    background: #fdfbf4;
    border-radius: 10px;
    padding: 30px 40px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

/* Center crease */
.book::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 2px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.06), rgba(0,0,0,0.02));
    transform: translateX(-50%);
}

/* ========== GRID ========== */
.add-customer-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    flex: 1;
    overflow-y: auto;
    min-width: 0;
}

/* ========== PAGE CARDS ========== */
.left-page, .right-page {
    background: #f9f9f4;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.04);
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-width: 0;
}

.left-page::before, .right-page::before {
    content: attr(data-section);
    font-weight: 600;
    font-size: 14px;
    color: #6b7280;
}

/* ========== FORM STYLING ========== */
.input-group {
    display: flex;
    align-items: stretch;
    height: 44px;
    width: 100%;
    min-width: 0;
}

.input-icon {
    width: 44px;
    background: #e5e7eb;
    border: 1px solid #d1d5db;
    border-right: none;
    border-radius: 8px 0 0 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.input-group input {
    flex: 1 1 auto;
    min-width: 0;
    border: 1px solid #d1d5db;
    border-radius: 0 8px 8px 0;
    padding: 0 14px;
    font-size: 14px;
    outline: none;
    background: #fffef8;
}

/* Rounded standalone inputs */
.input-rounded input,
.input-rounded textarea {
    width: 100%;
    height: 44px;
    padding: 0 14px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    outline: none;
    background: #fffef8;
}

.input-rounded textarea {
    height: 90px;
    padding: 12px 14px;
    resize: vertical;
}

/* ZIP ROW */
.zip-city-state {
    display: flex;
    gap: 12px;
    min-width: 0;
}

.zip-city-state input {
    height: 44px;
    padding: 0 14px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    outline: none;
    background: #fffef8;
    min-width: 0;
}

#zip { width: 100px; }
#city { flex: 1; background: #e5e7eb; cursor: not-allowed; }
#state { width: 70px; background: #e5e7eb; cursor: not-allowed; }

/* Focus */
input:focus, textarea:focus {
    border-color: #9ca3af;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

/* Required highlight */
input:required:invalid { border-color: #f87171; }
input:required:valid { border-color: #34d399; }

/* Buttons */
.form-buttons {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: auto;
}

.button-save {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

.button-save:hover {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
}

.button-cancel {
    background: #f3f4f6;
    color: #374151;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

.button-cancel:hover {
    background: #e5e7eb;
}

/* Responsive */
@media (max-width: 900px) {
    .add-customer-form { grid-template-columns: 1fr; gap: 20px; }
    .zip-city-state { flex-direction: column; }
    #zip, #city, #state { width: 100%; cursor: auto; background: white; }
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Database</h2>
    <a href="#">All Customers</a>
    <a href="#">Add Customer</a>
    <a href="#">Recent Activity</a>
    <a href="#">Archived</a>
    <a href="#">Settings</a>
</div>

<div class="main-content">
<div class="header">Add New Customer</div>

<div class="book-wrapper">
<div class="book">

<form class="add-customer-form" method="POST" action="save_customer.php">

<div class="left-page" data-section="Business Info">

<div class="input-group">
<div class="input-icon">🏢</div>
<input type="text" name="business_name" placeholder="Business Name *" required>
</div>

<div class="input-group">
<div class="input-icon">📍</div>
<input type="text" name="address" placeholder="Address *" required>
</div>

<div class="zip-city-state">
<input type="text" name="zip" placeholder="Zip *" required>
<input type="text" name="city" placeholder="City" disabled>
<input type="text" name="state" placeholder="ST" disabled>
</div>

<div class="input-group">
<div class="input-icon">📞</div>
<input type="text" name="phone" placeholder="Main Phone">
</div>

<div class="input-group">
<div class="input-icon">✉️</div>
<input type="email" name="email" placeholder="Email">
</div>

<div class="input-group">
<div class="input-icon">⏰</div>
<input type="time" name="hard_close">
</div>

</div>

<div class="right-page" data-section="Primary Contact">

<div class="input-rounded">
<input type="text" name="contact_name" placeholder="Default Contact Name *" required>
</div>

<div class="input-rounded">
<input type="text" name="contact_phone" placeholder="Contact Phone">
</div>

<div class="input-rounded">
<input type="text" name="extension" placeholder="Extension">
</div>

<div class="input-rounded">
<textarea name="notes" placeholder="Notes"></textarea>
</div>

<div class="form-buttons">
<button type="button" class="button-cancel">Cancel</button>
<button type="submit" class="button-save">Save Customer</button>
</div>

</div>

</form>

</div>
</div>
</div>

</body>
</html>
